    <text x="52" y="28" fill="#e0e8f0" font-size="15" font-weight="600">Structural Work</text>
    <text x="52" y="44" fill="#6a82a0" font-size="11">Steel beams, floor joists, load-bearing walls</text>
    <text x="480" y="28" text-anchor="end" fill="#c8a45e" font-size="18" font-weight="700">35%</text>
    <text x="520" y="28" text-anchor="end" fill="#5a7399" font-size="13">£29,750</text>

    <!-- Item 2 -->
    <rect x="0" y="65" width="540" height="56" fill="#162240" rx="6" stroke="#1e3050" stroke-width="1"/>
    <rect x="16" y="81" width="24" height="24" fill="#4a8ab5" rx="4"/>
    <text x="52" y="93" fill="#e0e8f0" font-size="15" font-weight="600">Roofing &amp; External</text>
    <text x="52" y="109" fill="#6a82a0" font-size="11">Tiles, cladding, flashing, weatherproofing</text>
    <text x="480" y="93" text-anchor="end" fill="#4a8ab5" font-size="18" font-weight="700">15%</text>
    <text x="520" y="93" text-anchor="end" fill="#5a7399" font-size="13">£12,750</text>

    <!-- Item 3 -->
    <rect x="0" y="130" width="540" height="56" fill="#162240" rx="6" stroke="#1e3050" stroke-width="1"/>
    <rect x="16" y="146" width="24" height="24" fill="#5bb88a" rx="4"/>
    <text x="52" y="158" fill="#e0e8f0" font-size="15" font-weight="600">First Fix</text>
    <text x="52" y="174" fill="#6a82a0" font-size="11">Electrics, plumbing, wiring before plastering</text>
    <text x="480" y="158" text-anchor="end" fill="#5bb88a" font-size="18" font-weight="700">12%</text>
    <text x="520" y="158" text-anchor="end" fill="#5a7399" font-size="13">£10,200</text>

    <!-- Item 4 -->
    <rect x="0" y="195" width="540" height="56" fill="#162240" rx="6" stroke="#1e3050" stroke-width="1"/>
    <rect x="16" y="211" width="24" height="24" fill="#8b6ec8" rx="4"/>
    <text x="52" y="223" fill="#e0e8f0" font-size="15" font-weight="600">Second Fix &amp; Plastering</text>
    <text x="52" y="239" fill="#6a82a0" font-size="11">Sockets, switches, skirting, plasterboard, skim</text>
    <text x="480" y="223" text-anchor="end" fill="#8b6ec8" font-size="18" font-weight="700">10%</text>
    <text x="520" y="223" text-anchor="end" fill="#5a7399" font-size="13">£8,500</text>

    <!-- Item 5 -->
    <rect x="0" y="260" width="263" height="56" fill="#162240" rx="6" stroke="#1e3050" stroke-width="1"/>
    <rect x="16" y="276" width="24" height="24" fill="#c76b5e" rx="4"/>
    <text x="52" y="291" fill="#e0e8f0" font-size="14" font-weight="600">Insulation</text>
    <text x="200" y="291" text-anchor="end" fill="#c76b5e" font-size="16" font-weight="700">8%</text>
    <text x="247" y="291" text-anchor="end" fill="#5a7399" font-size="12">£6,800</text>

    <!-- Item 6 -->
    <rect x="277" y="260" width="263" height="56" fill="#162240" rx="6" stroke="#1e3050" stroke-width="1"/>
    <rect x="293" y="276" width="24" height="24" fill="#5ec7b8" rx="4"/>
    <text x="329" y="291" fill="#e0e8f0" font-size="14" font-weight="600">Bathroom</text>
    <text x="477" y="291" text-anchor="end" fill="#5ec7b8" font-size="16" font-weight="700">8%</text>
    <text x="524" y="291" text-anchor="end" fill="#5a7399" font-size="12">£6,800</text>

    <!-- Item 7 -->
    <rect x="0" y="325" width="263" height="56" fill="#162240" rx="6" stroke="#1e3050" stroke-width="1"/>
    <rect x="16" y="341" width="24" height="24" fill="#c7b35e" rx="4"/>
    <text x="52" y="356" fill="#e0e8f0" font-size="14" font-weight="600">Staircase</text>
    <text x="200" y="356" text-anchor="end" fill="#c7b35e" font-size="16" font-weight="700">7%</text>
    <text x="247" y="356" text-anchor="end" fill="#5a7399" font-size="12">£5,950</text>

    <!-- Item 8 -->
    <rect x="277" y="325" width="263" height="56" fill="#162240" rx="6" stroke="#1e3050" stroke-width="1"/>
    <rect x="293" y="341" width="24" height="24" fill="#7a8ea8" rx="4"/>
    <text x="329" y="356" fill="#e0e8f0" font-size="14" font-weight="600">Prof. Fees</text>
    <text x="477" y="356" text-anchor="end" fill="#7a8ea8" font-size="16" font-weight="700">5%</text>
    <text x="524" y="356" text-anchor="end" fill="#5a7399" font-size="12">£4,250</text>
  </g>

  <!-- Additional costs callout -->
  <g transform="translate(620, 545)">
    <rect x="0" y="0" width="540" height="70" fill="#1a1520" rx="8" stroke="#c76b5e" stroke-width="1" stroke-opacity="0.4"/>
    <text x="20" y="24" fill="#c76b5e" font-size="13" font-weight="700">⚠ ADDITIONAL COSTS NOT INCLUDED ABOVE:</text>
    <text x="20" y="44" fill="#8a9cbd" font-size="12">Party wall agreements (£1k–£3k/neighbour) · Building Control fees (£800–£1,200)</text>
    <text x="20" y="60" fill="#8a9cbd" font-size="12">Planning application if needed (£206–£462) · Contingency fund (10–15% recommended)</text>
  </g>

  <!-- Footer -->
  <text x="1160" y="688" text-anchor="end" fill="#3a5580" font-size="10">bhstudio.co.uk · 2026 London Loft Conversion Guide</text>
</svg>
