<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a45e"/>
      <stop offset="100%" stop-color="#e8c96e"/>
    </linearGradient>
    <linearGradient id="spaceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a45e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c8a45e" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="240" y1="0" x2="240" y2="700"/><line x1="480" y1="0" x2="480" y2="700"/>
    <line x1="720" y1="0" x2="720" y2="700"/><line x1="960" y1="0" x2="960" y2="700"/>
  </g>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" fill="url(#accentGrad)" font-size="26" font-weight="700" letter-spacing="2" filter="url(#glow)">TYPES OF LONDON LOFT CONVERSIONS COMPARED</text>
  <line x1="350" y1="65" x2="850" y2="65" stroke="url(#accentGrad)" stroke-width="1" opacity="0.5"/>
  <text x="600" y="85" text-anchor="middle" fill="#8a9cbd" font-size="13" letter-spacing="1">CROSS-SECTION PROFILES · SPACE GAINED · 2026 COST RANGES</text>

  <!-- ===== 1. VELUX ===== -->
  <g transform="translate(40, 120)">
    <!-- House body -->
    <rect x="30" y="200" width="160" height="140" fill="#1e2f4d" stroke="#2a3f66" stroke-width="1.5" rx="2"/>
    <!-- Original roof -->
    <polygon points="10,200 110,120 210,200" fill="none" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <!-- Converted roof (same shape) -->
    <polygon points="10,200 110,120 210,200" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <!-- Velux windows -->
    <rect x="55" y="148" width="22" height="28" fill="#4a7ab5" stroke="#c8a45e" stroke-width="1.5" rx="1" transform="rotate(-33, 66, 162)"/>
    <rect x="120" y="148" width="22" height="28" fill="#4a7ab5" stroke="#c8a45e" stroke-width="1.5" rx="1" transform="rotate(33, 131, 162)"/>
    <!-- Windows on house -->
    <rect x="55" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="140" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="90" y="295" width="30" height="45" fill="#263d66" stroke="#3a5580" rx="1"/>
    <!-- Label -->
    <text x="110" y="380" text-anchor="middle" fill="#e8c96e" font-size="16" font-weight="700">VELUX</text>
    <text x="110" y="398" text-anchor="middle" fill="#8a9cbd" font-size="11">(Rooflight)</text>
    <!-- Cost -->
    <rect x="25" y="412" width="170" height="32" fill="#162240" stroke="#2a3f66" rx="4"/>
    <text x="110" y="433" text-anchor="middle" fill="#c8a45e" font-size="14" font-weight="600">£45k – £60k</text>
    <!-- Space tag -->
    <rect x="50" y="455" width="120" height="22" fill="#1a3a2a" stroke="#2d8a4e" rx="11" stroke-width="0.8"/>
    <text x="110" y="470" text-anchor="middle" fill="#4ecb71" font-size="10" font-weight="600">MINIMAL SPACE GAIN</text>
    <!-- Timeline -->
    <text x="110" y="500" text-anchor="middle" fill="#5a7399" font-size="10">4–6 weeks build</text>
  </g>

  <!-- ===== 2. DORMER ===== -->
  <g transform="translate(265, 120)">
    <rect x="30" y="200" width="160" height="140" fill="#1e2f4d" stroke="#2a3f66" stroke-width="1.5" rx="2"/>
    <!-- Original roof dashed -->
    <polygon points="10,200 110,120 210,200" fill="none" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <!-- Roof with dormer -->
    <polygon points="10,200 110,120 130,120" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <polygon points="130,120 130,200 210,200" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <!-- Dormer box -->
    <rect x="130" y="130" width="70" height="70" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <line x1="130" y1="125" x2="205" y2="125" stroke="#c8a45e" stroke-width="2"/>
    <!-- Dormer window -->
    <rect x="147" y="145" width="36" height="40" fill="#4a7ab5" stroke="#c8a45e" stroke-width="1.5" rx="1"/>
    <!-- Windows on house -->
    <rect x="55" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="140" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="90" y="295" width="30" height="45" fill="#263d66" stroke="#3a5580" rx="1"/>
    <!-- Label -->
    <text x="110" y="380" text-anchor="middle" fill="#e8c96e" font-size="16" font-weight="700">DORMER</text>
    <text x="110" y="398" text-anchor="middle" fill="#8a9cbd" font-size="11">(Rear Extension)</text>
    <rect x="25" y="412" width="170" height="32" fill="#162240" stroke="#2a3f66" rx="4"/>
    <text x="110" y="433" text-anchor="middle" fill="#c8a45e" font-size="14" font-weight="600">£55k – £90k</text>
    <rect x="40" y="455" width="140" height="22" fill="#1a3a2a" stroke="#2d8a4e" rx="11" stroke-width="0.8"/>
    <text x="110" y="470" text-anchor="middle" fill="#4ecb71" font-size="10" font-weight="600">SIGNIFICANT SPACE GAIN</text>
    <text x="110" y="500" text-anchor="middle" fill="#5a7399" font-size="10">8–12 weeks build</text>
  </g>

  <!-- ===== 3. HIP-TO-GABLE ===== -->
  <g transform="translate(490, 120)">
    <rect x="30" y="200" width="160" height="140" fill="#1e2f4d" stroke="#2a3f66" stroke-width="1.5" rx="2"/>
    <!-- Original hipped roof dashed -->
    <polygon points="10,200 60,140 160,140 210,200" fill="none" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <polygon points="60,140 110,120 160,140" fill="none" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <!-- Converted: gable end -->
    <polygon points="10,200 110,120 210,200" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <!-- Gable wall line -->
    <line x1="210" y1="120" x2="210" y2="200" stroke="#c8a45e" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Arrow showing extension -->
    <line x1="165" y1="155" x2="200" y2="155" stroke="#e8c96e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <text x="175" y="148" fill="#e8c96e" font-size="8" text-anchor="middle">EXTENDED</text>
    <!-- Windows -->
    <rect x="55" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="140" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="90" y="295" width="30" height="45" fill="#263d66" stroke="#3a5580" rx="1"/>
    <!-- Label -->
    <text x="110" y="380" text-anchor="middle" fill="#e8c96e" font-size="16" font-weight="700">HIP-TO-GABLE</text>
    <text x="110" y="398" text-anchor="middle" fill="#8a9cbd" font-size="11">(Side Extension)</text>
    <rect x="25" y="412" width="170" height="32" fill="#162240" stroke="#2a3f66" rx="4"/>
    <text x="110" y="433" text-anchor="middle" fill="#c8a45e" font-size="14" font-weight="600">£65k – £90k</text>
    <rect x="50" y="455" width="120" height="22" fill="#1a3a2a" stroke="#2d8a4e" rx="11" stroke-width="0.8"/>
    <text x="110" y="470" text-anchor="middle" fill="#4ecb71" font-size="10" font-weight="600">LARGE SPACE GAIN</text>
    <text x="110" y="500" text-anchor="middle" fill="#5a7399" font-size="10">10–14 weeks build</text>
  </g>

  <!-- ===== 4. MANSARD ===== -->
  <g transform="translate(715, 120)">
    <rect x="30" y="200" width="160" height="140" fill="#1e2f4d" stroke="#2a3f66" stroke-width="1.5" rx="2"/>
    <!-- Original roof dashed -->
    <polygon points="10,200 110,120 210,200" fill="none" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <!-- Mansard shape: near-vertical walls + flat top -->
    <polygon points="10,200 30,130 190,130 210,200" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <line x1="30" y1="125" x2="190" y2="125" stroke="#c8a45e" stroke-width="2"/>
    <!-- Dormers in mansard -->
    <rect x="50" y="145" width="30" height="35" fill="#4a7ab5" stroke="#c8a45e" stroke-width="1.2" rx="1"/>
    <rect x="130" y="145" width="30" height="35" fill="#4a7ab5" stroke="#c8a45e" stroke-width="1.2" rx="1"/>
    <!-- 72° angle notation -->
    <text x="18" y="178" fill="#e8c96e" font-size="9" transform="rotate(-78, 18, 178)">72°</text>
    <!-- Windows -->
    <rect x="55" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="140" y="230" width="25" height="30" fill="#263d66" stroke="#3a5580" rx="1"/>
    <rect x="90" y="295" width="30" height="45" fill="#263d66" stroke="#3a5580" rx="1"/>
    <!-- Label -->
    <text x="110" y="380" text-anchor="middle" fill="#e8c96e" font-size="16" font-weight="700">MANSARD</text>
    <text x="110" y="398" text-anchor="middle" fill="#8a9cbd" font-size="11">(Full Restructure)</text>
    <rect x="25" y="412" width="170" height="32" fill="#162240" stroke="#2a3f66" rx="4"/>
    <text x="110" y="433" text-anchor="middle" fill="#c8a45e" font-size="14" font-weight="600">£80k – £130k+</text>
    <rect x="40" y="455" width="140" height="22" fill="#1a3a2a" stroke="#2d8a4e" rx="11" stroke-width="0.8"/>
    <text x="110" y="470" text-anchor="middle" fill="#4ecb71" font-size="10" font-weight="600">MAXIMUM SPACE GAIN</text>
    <text x="110" y="500" text-anchor="middle" fill="#5a7399" font-size="10">12–16+ weeks build</text>
  </g>

  <!-- ===== 5. L-SHAPED ===== -->
  <g transform="translate(940, 120)">
    <rect x="30" y="200" width="110" height="140" fill="#1e2f4d" stroke="#2a3f66" stroke-width="1.5" rx="2"/>
    <!-- Rear outrigger -->
    <rect x="90" y="260" width="70" height="80" fill="#1e2f4d" stroke="#2a3f66" stroke-width="1.5" rx="2"/>
    <!-- Original roof dashed -->
    <polygon points="10,200 85,130 160,200" fill="none" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <!-- Outrigger roof dashed -->
    <polygon points="80,260 125,220 170,260" fill="none" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <!-- L-shaped dormer - main -->
    <rect x="85" y="140" width="65" height="60" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <!-- L-shaped dormer - outrigger part -->
    <rect x="90" y="200" width="65" height="60" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <!-- Left roof part -->
    <polygon points="10,200 85,130 85,200" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="2"/>
    <!-- L-shape connector highlight -->
    <rect x="85" y="135" width="70" height="5" fill="#c8a45e" opacity="0.5"/>
    <!-- Windows -->
    <rect x="105" y="155" width="28" height="30" fill="#4a7ab5" stroke="#c8a45e" stroke-width="1.2" rx="1"/>
    <rect x="105" y="215" width="28" height="30" fill="#4a7ab5" stroke="#c8a45e" stroke-width="1.2" rx="1"/>
    <!-- Door -->
    <rect x="55" y="300" width="25" height="40" fill="#263d66" stroke="#3a5580" rx="1"/>
    <!-- Label -->
    <text x="95" y="380" text-anchor="middle" fill="#e8c96e" font-size="16" font-weight="700">L-SHAPED</text>
    <text x="95" y="398" text-anchor="middle" fill="#8a9cbd" font-size="11">(Double Dormer)</text>
    <rect x="10" y="412" width="170" height="32" fill="#162240" stroke="#2a3f66" rx="4"/>
    <text x="95" y="433" text-anchor="middle" fill="#c8a45e" font-size="14" font-weight="600">£85k – £120k</text>
    <rect x="25" y="455" width="140" height="22" fill="#1a3a2a" stroke="#2d8a4e" rx="11" stroke-width="0.8"/>
    <text x="95" y="470" text-anchor="middle" fill="#4ecb71" font-size="10" font-weight="600">LARGEST FOOTPRINT</text>
    <text x="95" y="500" text-anchor="middle" fill="#5a7399" font-size="10">10–14 weeks build</text>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 650)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#3a5580" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="28" y="4" fill="#5a7399" font-size="10">Original roof profile</text>
    <line x1="180" y1="0" x2="200" y2="0" stroke="#c8a45e" stroke-width="2"/>
    <text x="208" y="4" fill="#5a7399" font-size="10">Converted profile</text>
    <rect x="340" y="-6" width="14" height="12" fill="url(#spaceGrad)" stroke="#c8a45e" stroke-width="1"/>
    <text x="362" y="4" fill="#5a7399" font-size="10">Space gained</text>
  </g>

  <!-- Footer -->
  <text x="1160" y="688" text-anchor="end" fill="#3a5580" font-size="10">bhstudio.co.uk · 2026 London Loft Conversion Guide</text>
</svg>
