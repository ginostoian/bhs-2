<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a45e"/>
      <stop offset="100%" stop-color="#e8c96e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a45e"/>
      <stop offset="100%" stop-color="#e8c96e"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a8ab5"/>
      <stop offset="100%" stop-color="#6aaad5"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b6ec8"/>
      <stop offset="100%" stop-color="#ab8ee8"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c76b5e"/>
      <stop offset="100%" stop-color="#e78b7e"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5bb88a"/>
      <stop offset="100%" stop-color="#7bd8aa"/>
    </linearGradient>
    <linearGradient id="bar6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ec7b8"/>
      <stop offset="100%" stop-color="#7ee7d8"/>
    </linearGradient>
    <linearGradient id="bar7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c7b35e"/>
      <stop offset="100%" stop-color="#e7d37e"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="600" y="48" text-anchor="middle" fill="url(#gold4)" font-size="26" font-weight="700" letter-spacing="2" filter="url(#glow4)">THE LOFT CONVERSION TIMELINE</text>
  <line x1="370" y1="62" x2="830" y2="62" stroke="url(#gold4)" stroke-width="1" opacity="0.5"/>
  <text x="600" y="82" text-anchor="middle" fill="#8a9cbd" font-size="13" letter-spacing="1">TYPICAL DORMER CONVERSION · 20 WEEKS FROM DESIGN TO COMPLETION</text>

  <!-- Timeline axis -->
  <!-- Weeks 1–24, chart area: x=310 to x=1140, so each week = ~34.6px -->
  <!-- Let's use x=320 to x=1140, 820px / 24 weeks = 34.17px per week -->
  
  <g transform="translate(0, 100)">
    <!-- Week markers -->
    <g fill="#3a5580" font-size="10" text-anchor="middle">
      <text x="320" y="18">W1</text>
      <text x="354" y="18">W2</text>
      <text x="388" y="18">W3</text>
      <text x="422" y="18">W4</text>
      <text x="457" y="18">W5</text>
      <text x="491" y="18">W6</text>
      <text x="525" y="18">W7</text>
      <text x="559" y="18">W8</text>
      <text x="593" y="18">W9</text>
      <text x="627" y="18">W10</text>
      <text x="662" y="18">W11</text>
      <text x="696" y="18">W12</text>
      <text x="730" y="18">W13</text>
      <text x="764" y="18">W14</text>
      <text x="798" y="18">W15</text>
      <text x="832" y="18">W16</text>
      <text x="866" y="18">W17</text>
      <text x="901" y="18">W18</text>
      <text x="935" y="18">W19</text>
      <text x="969" y="18">W20</text>
      <text x="1003" y="18">W21</text>
      <text x="1037" y="18">W22</text>
      <text x="1071" y="18">W23</text>
      <text x="1106" y="18">W24</text>
    </g>
    <!-- Vertical grid lines -->
    <g stroke="#1e3050" stroke-width="0.5">
      <line x1="320" y1="25" x2="320" y2="510"/>
      <line x1="457" y1="25" x2="457" y2="510"/>
      <line x1="593" y1="25" x2="593" y2="510"/>
      <line x1="730" y1="25" x2="730" y2="510"/>
      <line x1="866" y1="25" x2="866" y2="510"/>
      <line x1="1003" y1="25" x2="1003" y2="510"/>
      <line x1="1140" y1="25" x2="1140" y2="510"/>
    </g>

    <!-- Phase labels and bars -->
    <!-- Row height = 68px, starting at y=35 -->

    <!-- 1. Feasibility Assessment: W1-2 -->
    <g transform="translate(0, 35)">
      <rect x="30" y="0" width="275" height="56" fill="#162240" rx="6" stroke="#1e3050"/>
      <circle cx="52" cy="16" r="12" fill="#c8a45e" opacity="0.15"/>
      <text x="52" y="20" text-anchor="middle" fill="#c8a45e" font-size="13" font-weight="700">1</text>
      <text x="72" y="20" fill="#e0e8f0" font-size="14" font-weight="600">Feasibility Assessment</text>
      <text x="72" y="40" fill="#5a7399" font-size="11">Head height check, initial survey</text>
      <!-- Bar: W1-2 = x320 to x388 -->
      <rect x="320" y="10" width="68" height="36" fill="url(#bar1)" rx="6" opacity="0.9"/>
      <text x="354" y="34" text-anchor="middle" fill="#1a2744" font-size="11" font-weight="700">1–2 wks</text>
    </g>

    <!-- 2. Design & Drawings: W2-6 -->
    <g transform="translate(0, 103)">
      <rect x="30" y="0" width="275" height="56" fill="#162240" rx="6" stroke="#1e3050"/>
      <circle cx="52" cy="16" r="12" fill="#4a8ab5" opacity="0.15"/>
      <text x="52" y="20" text-anchor="middle" fill="#4a8ab5" font-size="13" font-weight="700">2</text>
      <text x="72" y="20" fill="#e0e8f0" font-size="14" font-weight="600">Design &amp; Drawings</text>
      <text x="72" y="40" fill="#5a7399" font-size="11">Architect plans, structural calcs</text>
      <!-- Bar: W2-6 = x354 to x525 -->
      <rect x="354" y="10" width="171" height="36" fill="url(#bar2)" rx="6" opacity="0.9"/>
      <text x="439" y="34" text-anchor="middle" fill="#1a2744" font-size="11" font-weight="700">4 weeks</text>
    </g>

    <!-- 3. Planning & Approvals: W4-12 -->
    <g transform="translate(0, 171)">
      <rect x="30" y="0" width="275" height="56" fill="#162240" rx="6" stroke="#1e3050"/>
      <circle cx="52" cy="16" r="12" fill="#8b6ec8" opacity="0.15"/>
      <text x="52" y="20" text-anchor="middle" fill="#8b6ec8" font-size="13" font-weight="700">3</text>
      <text x="72" y="20" fill="#e0e8f0" font-size="14" font-weight="600">Planning &amp; Approvals</text>
      <text x="72" y="40" fill="#5a7399" font-size="11">Building regs, LDC, planning (if needed)</text>
      <!-- Bar: W4-12 = x422 to x730 -->
      <rect x="422" y="10" width="308" height="36" fill="url(#bar3)" rx="6" opacity="0.9"/>
      <text x="576" y="34" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">8 weeks (if planning needed)</text>
    </g>

    <!-- 4. Party Wall Process: W4-14 (overlaps with above) -->
    <g transform="translate(0, 239)">
      <rect x="30" y="0" width="275" height="56" fill="#162240" rx="6" stroke="#1e3050"/>
      <circle cx="52" cy="16" r="12" fill="#c76b5e" opacity="0.15"/>
      <text x="52" y="20" text-anchor="middle" fill="#c76b5e" font-size="13" font-weight="700">4</text>
      <text x="72" y="20" fill="#e0e8f0" font-size="14" font-weight="600">Party Wall Notices</text>
      <text x="72" y="40" fill="#5a7399" font-size="11">2-month notice, surveyor if needed</text>
      <!-- Bar: W4-14 = x422 to x798 -->
      <rect x="422" y="10" width="376" height="36" fill="url(#bar4)" rx="6" opacity="0.9"/>
      <text x="610" y="34" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">8–12 weeks (2-month notice + negotiation)</text>
    </g>

    <!-- 5. Contractor Selection: W10-12 -->
    <g transform="translate(0, 307)">
      <rect x="30" y="0" width="275" height="56" fill="#162240" rx="6" stroke="#1e3050"/>
      <circle cx="52" cy="16" r="12" fill="#5bb88a" opacity="0.15"/>
      <text x="52" y="20" text-anchor="middle" fill="#5bb88a" font-size="13" font-weight="700">5</text>
      <text x="72" y="20" fill="#e0e8f0" font-size="14" font-weight="600">Contractor Selection</text>
      <text x="72" y="40" fill="#5a7399" font-size="11">Quotes, comparisons, contract</text>
      <!-- Bar: W10-12 = x627 to x730 -->
      <rect x="627" y="10" width="103" height="36" fill="url(#bar5)" rx="6" opacity="0.9"/>
      <text x="679" y="34" text-anchor="middle" fill="#1a2744" font-size="11" font-weight="700">2–3 wks</text>
    </g>

    <!-- 6. Construction: W12-22 -->
    <g transform="translate(0, 375)">
      <rect x="30" y="0" width="275" height="56" fill="#162240" rx="6" stroke="#1e3050"/>
      <circle cx="52" cy="16" r="12" fill="#5ec7b8" opacity="0.15"/>
      <text x="52" y="20" text-anchor="middle" fill="#5ec7b8" font-size="13" font-weight="700">6</text>
      <text x="72" y="20" fill="#e0e8f0" font-size="14" font-weight="600">Construction</text>
      <text x="72" y="40" fill="#5a7399" font-size="11">Structural, roofing, fit-out, decoration</text>
      <!-- Bar: W12-22 = x730 to x1071 -->
      <rect x="730" y="10" width="341" height="36" fill="url(#bar6)" rx="6" opacity="0.9"/>
      <text x="900" y="34" text-anchor="middle" fill="#1a2744" font-size="11" font-weight="700">8–12 weeks (dormer)</text>
    </g>

    <!-- 7. Sign-off & Completion: W22-24 -->
    <g transform="translate(0, 443)">
      <rect x="30" y="0" width="275" height="56" fill="#162240" rx="6" stroke="#1e3050"/>
      <circle cx="52" cy="16" r="12" fill="#c7b35e" opacity="0.15"/>
      <text x="52" y="20" text-anchor="middle" fill="#c7b35e" font-size="13" font-weight="700">7</text>
      <text x="72" y="20" fill="#e0e8f0" font-size="14" font-weight="600">Sign-off &amp; Completion</text>
      <text x="72" y="40" fill="#5a7399" font-size="11">Building Control, certification</text>
      <!-- Bar: W22-24 = x1037 to x1140 -->
      <rect x="1037" y="10" width="103" height="36" fill="url(#bar7)" rx="6" opacity="0.9"/>
      <text x="1089" y="34" text-anchor="middle" fill="#1a2744" font-size="11" font-weight="700">1–2 wks</text>
    </g>
  </g>

  <!-- Key insight callouts -->
  <g transform="translate(40, 625)">
    <rect x="0" y="0" width="360" height="35" fill="#162240" rx="6" stroke="#c8a45e" stroke-width="0.8"/>
    <text x="16" y="22" fill="#c8a45e" font-size="12" font-weight="600">💡 Steps 3 &amp; 4 run in parallel — plan both early</text>
  </g>
  <g transform="translate(420, 625)">
    <rect x="0" y="0" width="370" height="35" fill="#162240" rx="6" stroke="#c76b5e" stroke-width="0.8"/>
    <text x="16" y="22" fill="#c76b5e" font-size="12" font-weight="600">⚠ Party wall delays are the #1 cause of overruns</text>
  </g>
  <g transform="translate(810, 625)">
    <rect x="0" y="0" width="350" height="35" fill="#162240" rx="6" stroke="#5ec7b8" stroke-width="0.8"/>
    <text x="16" y="22" fill="#5ec7b8" font-size="12" font-weight="600">✓ You can stay in your home during the build</text>
  </g>

  <!-- Footer -->
  <text x="1160" y="688" text-anchor="end" fill="#3a5580" font-size="10">bhstudio.co.uk · 2026 London Loft Conversion Guide</text>
</svg>
