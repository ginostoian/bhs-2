<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Alt text: Infographic showing cost versus value added for home extensions in London, with loft conversions highlighted as best ROI -->
  <title>London House Extension: Cost vs Value Added Comparison 2025</title>
  
  <rect width="800" height="450" fill="#1a1a1a" rx="12"/>
  
  <text x="400" y="38" text-anchor="middle" font-size="19" font-weight="700" fill="#f0ece4">Cost vs Value: London Extension ROI</text>
  <text x="400" y="58" text-anchor="middle" font-size="12" fill="#999">Based on a £750,000 London property — 2025 estimates</text>
  
  <!-- Card 1: Single-Storey -->
  <rect x="30" y="85" width="230" height="155" fill="#222" rx="10" stroke="#333" stroke-width="1"/>
  <text x="145" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#c4a882">Single-Storey Rear</text>
  <text x="145" y="145" text-anchor="middle" font-size="11" fill="#888">Typical Cost</text>
  <text x="145" y="168" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">£60k – £105k</text>
  <text x="145" y="195" text-anchor="middle" font-size="11" fill="#888">Value Added</text>
  <text x="145" y="218" text-anchor="middle" font-size="22" font-weight="700" fill="#6dbe82">£37k – £112k</text>
  
  <!-- Card 2: Double-Storey -->
  <rect x="285" y="85" width="230" height="155" fill="#222" rx="10" stroke="#333" stroke-width="1"/>
  <text x="400" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#8b7355">Double-Storey</text>
  <text x="400" y="145" text-anchor="middle" font-size="11" fill="#888">Typical Cost</text>
  <text x="400" y="168" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">£100k – £180k</text>
  <text x="400" y="195" text-anchor="middle" font-size="11" fill="#888">Value Added</text>
  <text x="400" y="218" text-anchor="middle" font-size="22" font-weight="700" fill="#6dbe82">£112k – £150k</text>
  
  <!-- Card 3: Loft Conversion (featured) -->
  <rect x="540" y="80" width="235" height="165" fill="#2d5a3d" rx="10" stroke="#4a8c5c" stroke-width="2"/>
  <text x="657" y="102" text-anchor="middle" font-size="9" font-weight="700" fill="#a3d9b1" letter-spacing="2">★ BEST ROI</text>
  <text x="657" y="122" text-anchor="middle" font-size="14" font-weight="600" fill="#e8f5ec">Loft Conversion</text>
  <text x="657" y="152" text-anchor="middle" font-size="11" fill="#a3d9b1">Typical Cost</text>
  <text x="657" y="175" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">£50k – £90k</text>
  <text x="657" y="202" text-anchor="middle" font-size="11" fill="#a3d9b1">Value Added</text>
  <text x="657" y="225" text-anchor="middle" font-size="22" font-weight="700" fill="#6dbe82">£112k – £187k</text>
  
  <!-- Card 4: Side Return -->
  <rect x="30" y="265" width="230" height="155" fill="#222" rx="10" stroke="#333" stroke-width="1"/>
  <text x="145" y="292" text-anchor="middle" font-size="14" font-weight="600" fill="#d4c5a9">Side Return</text>
  <text x="145" y="325" text-anchor="middle" font-size="11" fill="#888">Typical Cost</text>
  <text x="145" y="348" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">£30k – £55k</text>
  <text x="145" y="375" text-anchor="middle" font-size="11" fill="#888">Value Added</text>
  <text x="145" y="398" text-anchor="middle" font-size="22" font-weight="700" fill="#6dbe82">£37k – £75k</text>
  
  <!-- Card 5: Basement -->
  <rect x="285" y="265" width="230" height="155" fill="#222" rx="10" stroke="#333" stroke-width="1"/>
  <text x="400" y="292" text-anchor="middle" font-size="14" font-weight="600" fill="#aaa">Basement Conversion</text>
  <text x="400" y="325" text-anchor="middle" font-size="11" fill="#888">Typical Cost</text>
  <text x="400" y="348" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">£150k – £300k</text>
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#888">Value Added (Prime)</text>
  <text x="400" y="398" text-anchor="middle" font-size="22" font-weight="700" fill="#6dbe82">£180k – £500k+</text>
  
  <!-- Key Insight Box -->
  <rect x="540" y="265" width="235" height="155" fill="#2a2520" rx="10" stroke="#c4a882" stroke-width="1" stroke-dasharray="4"/>
  <text x="657" y="295" text-anchor="middle" font-size="12" font-weight="700" fill="#c4a882" letter-spacing="1">KEY INSIGHT</text>
  <text x="657" y="325" text-anchor="middle" font-size="12" fill="#ddd">Loft conversions offer</text>
  <text x="657" y="345" text-anchor="middle" font-size="12" fill="#ddd">the lowest cost-to-value</text>
  <text x="657" y="365" text-anchor="middle" font-size="12" fill="#ddd">ratio for most London</text>
  <text x="657" y="385" text-anchor="middle" font-size="12" fill="#ddd">properties. Basements win</text>
  <text x="657" y="405" text-anchor="middle" font-size="12" fill="#ddd">in prime postcodes only.</text>
  
  <!-- Footer -->
  <text x="400" y="442" text-anchor="middle" font-size="9" fill="#555">Estimates based on £750k property value. Actual returns vary by borough, design quality, and specification. | bhstudio.co.uk</text>
</svg>