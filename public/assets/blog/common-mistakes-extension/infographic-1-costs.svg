<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#1A2744"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="52" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="700" letter-spacing="0.5">London Extension Costs at a Glance</text>
  <text x="450" y="78" text-anchor="middle" fill="#94A3B8" font-size="13">Cost per square metre by extension type · 2025–2026 estimates</text>

  <!-- Scale markers -->
  <line x1="240" y1="105" x2="240" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="390" y1="105" x2="390" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="540" y1="105" x2="540" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="690" y1="105" x2="690" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="840" y1="105" x2="840" y2="490" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="240" y="510" text-anchor="middle" fill="#64748B" font-size="11">£1,000</text>
  <text x="390" y="510" text-anchor="middle" fill="#64748B" font-size="11">£2,500</text>
  <text x="540" y="510" text-anchor="middle" fill="#64748B" font-size="11">£4,000</text>
  <text x="690" y="510" text-anchor="middle" fill="#64748B" font-size="11">£5,500</text>
  <text x="840" y="510" text-anchor="middle" fill="#64748B" font-size="11">£7,000</text>

  <!-- Row 1: Single-Storey Rear -->
  <g>
    <!-- Icon -->
    <rect x="32" y="118" width="36" height="24" rx="2" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
    <polygon points="32,118 50,106 68,118" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
    <rect x="56" y="126" width="12" height="16" rx="1" fill="none" stroke="#60A5FA" stroke-width="1.2" opacity="0.6"/>

    <text x="78" y="128" fill="#E2E8F0" font-size="14" font-weight="600">Single-Storey Rear</text>
    <text x="78" y="146" fill="#94A3B8" font-size="11">Most common London extension</text>
    <!-- Bar: £2,500–£4,000 mapped to 240–540 range. £2,500=390, £4,000=540 -->
    <rect x="390" y="117" width="150" height="36" rx="6" fill="url(#bar1)" filter="url(#shadow)" opacity="0.9"/>
    <text x="397" y="140" fill="#FFFFFF" font-size="12" font-weight="600">£2,500 – £4,000</text>
  </g>

  <!-- Row 2: Double-Storey -->
  <g>
    <rect x="32" y="196" width="36" height="36" rx="2" fill="none" stroke="#A78BFA" stroke-width="1.5"/>
    <line x1="32" y1="214" x2="68" y2="214" stroke="#A78BFA" stroke-width="1" opacity="0.5"/>
    <polygon points="32,196 50,184 68,196" fill="none" stroke="#A78BFA" stroke-width="1.5"/>

    <text x="78" y="208" fill="#E2E8F0" font-size="14" font-weight="600">Double-Storey</text>
    <text x="78" y="226" fill="#94A3B8" font-size="11">Best value per square metre</text>
    <!-- £3,750–£6,000: 390+(1250*1.25/6)=... Let me recalc. Scale: 240=£1000, 840=£7000. Per £1 = 100px/1000 = 0.1px. £3,750 = 240 + (2750*0.1) = 515. £6,000 = 240 + (5000*0.1) = 740 -->
    <rect x="515" y="197" width="225" height="36" rx="6" fill="url(#bar2)" filter="url(#shadow)" opacity="0.9"/>
    <text x="522" y="220" fill="#FFFFFF" font-size="12" font-weight="600">£3,750 – £6,000</text>
  </g>

  <!-- Row 3: Side Return -->
  <g>
    <rect x="32" y="276" width="36" height="24" rx="2" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <polygon points="32,276 50,264 68,276" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <rect x="26" y="282" width="12" height="18" rx="1" fill="none" stroke="#22D3EE" stroke-width="1.2" opacity="0.5"/>

    <text x="78" y="288" fill="#E2E8F0" font-size="14" font-weight="600">Side Return</text>
    <text x="78" y="306" fill="#94A3B8" font-size="11">Popular on Victorian terraces</text>
    <!-- £2,800–£4,500: £2,800 = 240+(1800*0.1)=420. £4,500=240+(3500*0.1)=590 -->
    <rect x="420" y="277" width="170" height="36" rx="6" fill="url(#bar3)" filter="url(#shadow)" opacity="0.9"/>
    <text x="427" y="300" fill="#FFFFFF" font-size="12" font-weight="600">£2,800 – £4,500</text>
  </g>

  <!-- Row 4: Loft Conversion -->
  <g>
    <rect x="32" y="356" width="36" height="24" rx="2" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
    <polygon points="28,356 50,336 72,356" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
    <rect x="42" y="342" width="16" height="12" rx="1" fill="none" stroke="#FBBF24" stroke-width="1.2" opacity="0.5"/>

    <text x="78" y="368" fill="#E2E8F0" font-size="14" font-weight="600">Loft Conversion</text>
    <text x="78" y="386" fill="#94A3B8" font-size="11">Extends up, not out</text>
    <!-- £2,500–£4,000: same as single-storey = 390 to 540 -->
    <rect x="390" y="357" width="150" height="36" rx="6" fill="url(#bar4)" filter="url(#shadow)" opacity="0.9"/>
    <text x="397" y="380" fill="#FFFFFF" font-size="12" font-weight="600">£2,500 – £4,000</text>
  </g>

  <!-- Row 5: Basement -->
  <g>
    <rect x="32" y="446" width="36" height="24" rx="2" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <polygon points="32,446 50,434 68,446" fill="none" stroke="#F87171" stroke-width="1.5"/>
    <rect x="36" y="470" width="28" height="14" rx="2" fill="none" stroke="#F87171" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>

    <text x="78" y="448" fill="#E2E8F0" font-size="14" font-weight="600">Basement</text>
    <text x="78" y="466" fill="#94A3B8" font-size="11">High-value areas only</text>
    <!-- £5,000–£7,000: £5,000=240+(4000*0.1)=640. £7,000=840 -->
    <rect x="640" y="437" width="200" height="36" rx="6" fill="url(#bar5)" filter="url(#shadow)" opacity="0.9"/>
    <text x="647" y="460" fill="#FFFFFF" font-size="12" font-weight="600">£5,000 – £7,000</text>
  </g>

  <!-- Footer -->
  <line x1="40" y1="540" x2="860" y2="540" stroke="#334155" stroke-width="1"/>
  <text x="40" y="562" fill="#64748B" font-size="11">Figures represent construction costs only. Exclude VAT (20%), professional fees (15–20%), and fit-out costs.</text>
  <text x="40" y="580" fill="#64748B" font-size="11">Source: Industry estimates, 2025–2026. Actual costs vary by borough, specification, and site conditions.</text>
  <text x="860" y="602" text-anchor="end" fill="#475569" font-size="11" font-weight="600">bhstudio.co.uk</text>
</svg>
