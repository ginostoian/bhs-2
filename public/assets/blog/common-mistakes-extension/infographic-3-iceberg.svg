<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="60%" stop-color="#162038"/>
      <stop offset="100%" stop-color="#1A3050"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C4A6E"/>
      <stop offset="100%" stop-color="#082F49"/>
    </linearGradient>
    <linearGradient id="icetop" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="icebottom" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#38BDF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="waterline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#38BDF8"/>
      <stop offset="80%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="waterClip">
      <rect x="0" y="270" width="900" height="430"/>
    </clipPath>
  </defs>

  <!-- Sky / upper background -->
  <rect width="900" height="700" fill="url(#sky)"/>

  <!-- Water area -->
  <rect x="0" y="270" width="900" height="430" fill="url(#water)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="700" letter-spacing="0.5">The Hidden Cost Iceberg</text>
  <text x="450" y="66" text-anchor="middle" fill="#94A3B8" font-size="13">What a builder's quote shows you vs. what you'll actually spend</text>

  <!-- === ICEBERG TOP (above water) === -->
  <polygon points="360,110 540,110 570,268 330,268" fill="url(#icetop)" opacity="0.95"/>
  <!-- Light reflections on top -->
  <line x1="395" y1="140" x2="410" y2="180" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
  <line x1="420" y1="130" x2="430" y2="160" stroke="#FFFFFF" stroke-width="1" opacity="0.3"/>

  <!-- Label for visible portion -->
  <text x="450" y="175" text-anchor="middle" fill="#0F172A" font-size="15" font-weight="700">Construction</text>
  <text x="450" y="195" text-anchor="middle" fill="#0F172A" font-size="15" font-weight="700">Cost</text>
  <text x="450" y="218" text-anchor="middle" fill="#1E3A5F" font-size="12">The quote you see</text>

  <!-- Pointer from side -->
  <line x1="595" y1="180" x2="640" y2="180" stroke="#E0F2FE" stroke-width="1.5"/>
  <circle cx="640" cy="180" r="3" fill="#E0F2FE"/>
  <text x="650" y="172" fill="#FFFFFF" font-size="13" font-weight="600">~£60,000–£150,000+</text>
  <text x="650" y="190" fill="#94A3B8" font-size="11">Builder's headline figure</text>

  <!-- === WATERLINE === -->
  <rect x="0" y="264" width="900" height="12" fill="url(#waterline)" opacity="0.6"/>
  <!-- Wave effects -->
  <path d="M0,270 Q50,262 100,270 Q150,278 200,270 Q250,262 300,270 Q350,278 400,270 Q450,262 500,270 Q550,278 600,270 Q650,262 700,270 Q750,278 800,270 Q850,262 900,270" fill="none" stroke="#38BDF8" stroke-width="2" opacity="0.7"/>
  <path d="M0,276 Q50,268 100,276 Q150,284 200,276 Q250,268 300,276 Q350,284 400,276 Q450,268 500,276 Q550,284 600,276 Q650,268 700,276 Q750,284 800,276 Q850,268 900,276" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.35"/>

  <!-- === ICEBERG BOTTOM (below water) === -->
  <polygon points="330,270 570,270 650,430 620,530 510,600 390,600 280,530 250,430" fill="url(#icebottom)" clip-path="url(#waterClip)"/>

  <!-- Hidden cost items (positioned around the underwater iceberg) -->

  <!-- Left side items -->
  <g>
    <line x1="260" y1="320" x2="170" y2="310" stroke="#7DD3FC" stroke-width="1" opacity="0.6"/>
    <circle cx="167" cy="310" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="160" y="307" text-anchor="end" fill="#FFFFFF" font-size="13" font-weight="600">VAT at 20%</text>
    <text x="160" y="323" text-anchor="end" fill="#7DD3FC" font-size="11">+ £12,000–£30,000</text>
  </g>

  <g>
    <line x1="260" y1="380" x2="140" y2="378" stroke="#7DD3FC" stroke-width="1" opacity="0.6"/>
    <circle cx="137" cy="378" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="130" y="374" text-anchor="end" fill="#FFFFFF" font-size="13" font-weight="600">Professional Fees</text>
    <text x="130" y="390" text-anchor="end" fill="#7DD3FC" font-size="11">15–20% of build cost</text>
  </g>

  <g>
    <line x1="275" y1="445" x2="130" y2="448" stroke="#7DD3FC" stroke-width="1" opacity="0.6"/>
    <circle cx="127" cy="448" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="120" y="444" text-anchor="end" fill="#FFFFFF" font-size="13" font-weight="600">Party Wall Surveyor</text>
    <text x="120" y="460" text-anchor="end" fill="#7DD3FC" font-size="11">£1,000–£3,000 per neighbour</text>
  </g>

  <g>
    <line x1="300" y1="510" x2="150" y2="518" stroke="#7DD3FC" stroke-width="1" opacity="0.5"/>
    <circle cx="147" cy="518" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="140" y="514" text-anchor="end" fill="#FFFFFF" font-size="13" font-weight="600">Landscaping</text>
    <text x="140" y="530" text-anchor="end" fill="#7DD3FC" font-size="11">10–20% of build cost</text>
  </g>

  <!-- Right side items -->
  <g>
    <line x1="620" y1="320" x2="710" y2="310" stroke="#7DD3FC" stroke-width="1" opacity="0.6"/>
    <circle cx="713" cy="310" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="723" y="307" fill="#FFFFFF" font-size="13" font-weight="600">Planning &amp; Building Control</text>
    <text x="723" y="323" fill="#7DD3FC" font-size="11">£500–£2,000+</text>
  </g>

  <g>
    <line x1="640" y1="385" x2="720" y2="383" stroke="#7DD3FC" stroke-width="1" opacity="0.6"/>
    <circle cx="723" cy="383" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="733" y="379" fill="#FFFFFF" font-size="13" font-weight="600">Thames Water Agreement</text>
    <text x="733" y="395" fill="#7DD3FC" font-size="11">£300–£500 (build-over)</text>
  </g>

  <g>
    <line x1="615" y1="450" x2="720" y2="453" stroke="#7DD3FC" stroke-width="1" opacity="0.6"/>
    <circle cx="723" cy="453" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="733" y="449" fill="#FFFFFF" font-size="13" font-weight="600">Temporary Accommodation</text>
    <text x="733" y="465" fill="#7DD3FC" font-size="11">£2,000–£4,000/month</text>
  </g>

  <g>
    <line x1="560" y1="525" x2="700" y2="528" stroke="#7DD3FC" stroke-width="1" opacity="0.5"/>
    <circle cx="703" cy="528" r="3" fill="#7DD3FC" opacity="0.8"/>
    <text x="713" y="524" fill="#FFFFFF" font-size="13" font-weight="600">Contingency Fund</text>
    <text x="713" y="540" fill="#7DD3FC" font-size="11">10–20% of total budget</text>
  </g>

  <!-- Bottom center callout -->
  <g>
    <rect x="310" y="580" width="280" height="42" rx="8" fill="#0C4A6E" stroke="#38BDF8" stroke-width="1" opacity="0.9"/>
    <text x="450" y="600" text-anchor="middle" fill="#FBBF24" font-size="12" font-weight="700">TOTAL TRUE COST</text>
    <text x="450" y="616" text-anchor="middle" fill="#FFFFFF" font-size="12">Often 40–60% more than the build quote</text>
  </g>

  <!-- Percentage labels on iceberg -->
  <text x="450" y="240" text-anchor="middle" fill="#1E3A5F" font-size="11" font-weight="600" opacity="0.7">≈ 40% of total spend</text>
  <text x="450" y="440" text-anchor="middle" fill="#BAE6FD" font-size="11" font-weight="600" opacity="0.5">≈ 60% of total spend</text>

  <!-- Footer -->
  <text x="860" y="690" text-anchor="end" fill="#475569" font-size="11" font-weight="600">bhstudio.co.uk</text>
</svg>
