<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#1A2744"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="phase4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="phase5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="phase6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <filter id="tshadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="url(#tbg)" rx="16"/>

  <!-- Title -->
  <text x="450" y="48" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="700" letter-spacing="0.5">The Extension Timeline</text>
  <text x="450" y="72" text-anchor="middle" fill="#94A3B8" font-size="13">What to expect from start to finish · Typical London home extension</text>

  <!-- Month columns -->
  <!-- 12 months, x from 230 to 860. Each month = (860-230)/12 = 52.5px -->
  <g>
    <line x1="230" y1="95" x2="230" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="282" y1="95" x2="282" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="335" y1="95" x2="335" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="387" y1="95" x2="387" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="440" y1="95" x2="440" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="492" y1="95" x2="492" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="545" y1="95" x2="545" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="597" y1="95" x2="597" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="650" y1="95" x2="650" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="702" y1="95" x2="702" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="755" y1="95" x2="755" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="807" y1="95" x2="807" y2="435" stroke="#1E3050" stroke-width="1"/>
    <line x1="860" y1="95" x2="860" y2="435" stroke="#1E3050" stroke-width="1"/>

    <!-- Month labels -->
    <text x="256" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M1</text>
    <text x="308" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M2</text>
    <text x="361" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M3</text>
    <text x="413" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M4</text>
    <text x="466" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M5</text>
    <text x="518" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M6</text>
    <text x="571" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M7</text>
    <text x="623" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M8</text>
    <text x="676" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M9</text>
    <text x="728" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M10</text>
    <text x="781" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M11</text>
    <text x="833" y="110" text-anchor="middle" fill="#64748B" font-size="10" font-weight="600">M12</text>
  </g>

  <!-- Phase 1: Consultation & Brief — Month 1 -->
  <g>
    <text x="20" y="145" fill="#E2E8F0" font-size="12" font-weight="600">Consultation</text>
    <text x="20" y="159" fill="#94A3B8" font-size="10">&amp; Brief</text>
    <rect x="230" y="132" width="52" height="32" rx="5" fill="url(#phase1)" filter="url(#tshadow)" opacity="0.9"/>
    <text x="256" y="152" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">1 mo</text>
  </g>

  <!-- Phase 2: Design & Planning — Months 2–4 -->
  <g>
    <text x="20" y="195" fill="#E2E8F0" font-size="12" font-weight="600">Design &amp;</text>
    <text x="20" y="209" fill="#94A3B8" font-size="10">Planning</text>
    <rect x="282" y="182" width="158" height="32" rx="5" fill="url(#phase2)" filter="url(#tshadow)" opacity="0.9"/>
    <text x="361" y="202" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">2–4 months</text>
    <!-- Milestone diamond -->
    <polygon points="440,198 448,206 440,214 432,206" fill="#A78BFA"/>
    <text x="451" y="210" fill="#C4B5FD" font-size="9">Planning submitted</text>
  </g>

  <!-- Phase 3: Party Wall — Months 3–5 (overlapping) -->
  <g>
    <text x="20" y="249" fill="#E2E8F0" font-size="12" font-weight="600">Party Wall</text>
    <text x="20" y="263" fill="#94A3B8" font-size="10">Process</text>
    <rect x="335" y="236" width="157" height="32" rx="5" fill="url(#phase3)" filter="url(#tshadow)" opacity="0.85"/>
    <text x="413" y="256" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">2–3 months</text>
    <!-- Note about overlap -->
    <text x="498" y="260" fill="#67E8F9" font-size="9" font-style="italic">runs in parallel</text>
  </g>

  <!-- Phase 4: Building Regs & Tender — Months 4–6 -->
  <g>
    <text x="20" y="302" fill="#E2E8F0" font-size="12" font-weight="600">Building Regs</text>
    <text x="20" y="316" fill="#94A3B8" font-size="10">&amp; Tender</text>
    <rect x="387" y="289" width="158" height="32" rx="5" fill="url(#phase4)" filter="url(#tshadow)" opacity="0.9"/>
    <text x="466" y="309" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">2–3 months</text>
    <polygon points="545,305 553,313 545,321 537,313" fill="#FBBF24"/>
    <text x="558" y="317" fill="#FDE68A" font-size="9">Builder appointed</text>
  </g>

  <!-- Phase 5: Construction — Months 6–10 -->
  <g>
    <text x="20" y="356" fill="#E2E8F0" font-size="12" font-weight="600">Construction</text>
    <text x="20" y="370" fill="#94A3B8" font-size="10">On site</text>
    <rect x="518" y="343" width="210" height="32" rx="5" fill="url(#phase5)" filter="url(#tshadow)" opacity="0.9"/>
    <text x="623" y="363" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">3–5 months</text>
  </g>

  <!-- Phase 6: Snagging & Completion — Months 10–12 -->
  <g>
    <text x="20" y="410" fill="#E2E8F0" font-size="12" font-weight="600">Snagging &amp;</text>
    <text x="20" y="424" fill="#94A3B8" font-size="10">Completion</text>
    <rect x="728" y="397" width="105" height="32" rx="5" fill="url(#phase6)" filter="url(#tshadow)" opacity="0.9"/>
    <text x="780" y="417" text-anchor="middle" fill="#FFF" font-size="10" font-weight="600">1–2 months</text>
    <polygon points="833,413 841,421 833,429 825,421" fill="#F87171"/>
    <text x="846" y="425" fill="#FCA5A5" font-size="9">Move in!</text>
  </g>

  <!-- Legend -->
  <line x1="40" y1="455" x2="860" y2="455" stroke="#334155" stroke-width="1"/>

  <polygon points="50,475 56,481 50,487 44,481" fill="#A78BFA"/>
  <text x="62" y="484" fill="#94A3B8" font-size="10">Key milestone</text>

  <rect x="150" y="473" width="14" height="14" rx="2" fill="#22D3EE" opacity="0.3"/>
  <text x="170" y="484" fill="#94A3B8" font-size="10">Overlapping phases are normal and expected</text>

  <!-- Pro tip box -->
  <rect x="40" y="500" width="820" height="40" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="56" y="520" fill="#FBBF24" font-size="11" font-weight="700">PRO TIP:</text>
  <text x="118" y="520" fill="#CBD5E1" font-size="11">Start the party wall process and building regulations in parallel with planning — not after. This can save 2–3 months.</text>

  <text x="860" y="555" text-anchor="end" fill="#475569" font-size="11" font-weight="600">bhstudio.co.uk</text>
</svg>
